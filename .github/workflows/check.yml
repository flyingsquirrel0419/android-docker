name: "Check"

on:
  workflow_call:
  pull_request:

permissions: {}

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./src"
        env:
          SHELLCHECK_OPTS: -x --source-path=src -e SC1008 -e SC1091 -e SC2001 -e SC2034 -e SC2064 -e SC2153 -e SC2317
      -
        name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3006,DL3008
          failure-threshold: warning
      -
        name: Validate compose and kubernetes YAML
        uses: GrantBirki/json-yaml-validate@v3
        with:
          yaml_exclude_regex: ".*\\kubernetes\\.yml$"
