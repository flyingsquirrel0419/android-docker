name: "KVM Test"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'

concurrency:
  group: kvm-test
  cancel-in-progress: true

jobs:
  test:
    name: KVM Boot Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      -
        name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      -
        name: Checkout
        uses: actions/checkout@v4

      -
        name: Build Docker image
        run: docker build -t android-test .

      -
        name: Download Android ISO
        run: |
          ISO_URLS=(
            "https://osdn.net/dl/android-x86/android-x86_64-9.0-r2.iso"
            "https://downloads.sourceforge.net/project/android-x86/Release%209.0/android-x86_64-9.0-r2.iso"
          )
          for url in "${ISO_URLS[@]}"; do
            echo "Trying: $url"
            if curl -L -o /tmp/android.iso -Ss --fail \
                 --max-time 600 --connect-timeout 30 \
                 --retry 3 --retry-delay 10 "$url"; then
              if [ -s /tmp/android.iso ]; then
                echo "✅ Downloaded $(du -h /tmp/android.iso | cut -f1)"
                break
              fi
            fi
            echo "Failed, trying next..."
            rm -f /tmp/android.iso
          done
          if [ ! -s /tmp/android.iso ]; then
            echo "❌ All download URLs failed"
            exit 1
          fi

      -
        name: Run Android container
        run: |
          docker run -d \
            --name android \
            --device /dev/kvm \
            --cap-add NET_ADMIN \
            -p 8006:8006 \
            -p 5555:5555 \
            -e RAM_SIZE="4G" \
            -v android-storage:/storage \
            -v /tmp/android.iso:/custom.iso \
            android-test

      -
        name: Check container is alive
        run: |
          sleep 5
          if ! docker ps --filter name=android --format '{{.Names}}' | grep -q android; then
            echo "❌ Container exited unexpectedly!"
            docker logs android 2>&1
            exit 1
          fi
          echo "✅ Container is running"

      -
        name: Test noVNC (port 8006)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8006/ 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ noVNC responding with HTTP 200 after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ noVNC not responding after 30s (last status: $STATUS)"
              docker logs android 2>&1 | tail -30
              exit 1
            fi
            sleep 1
          done

      -
        name: Wait for ISO download and boot
        run: |
          for i in $(seq 1 600); do
            if ! docker ps --filter name=android --format '{{.Names}}' | grep -q android; then
              echo "❌ Container died during ISO download/boot!"
              docker logs android 2>&1 | tail -50
              exit 1
            fi

            LOGS=$(docker logs android 2>&1)
            if echo "$LOGS" | grep -q "started successfully"; then
              echo "✅ Android booted successfully after ${i}s"
              break
            fi
            if echo "$LOGS" | grep -q "Failed to download ISO"; then
              echo "❌ ISO download failed!"
              echo "$LOGS" | tail -30
              exit 1
            fi
            if [ $i -eq 600 ]; then
              echo "❌ Timeout waiting for ISO (600s)"
              docker logs android 2>&1 | tail -50
              exit 1
            fi
            sleep 1
          done

      -
        name: Wait for QEMU boot
        run: |
          for i in $(seq 1 60); do
            LOGS=$(docker logs android 2>&1)
            if echo "$LOGS" | grep -q "QEMU has started"; then
              echo "✅ QEMU started after ${i}s"
              break
            fi
            if ! docker ps --filter name=android --format '{{.Names}}' | grep -q android; then
              echo "❌ Container died before QEMU boot!"
              docker logs android 2>&1 | tail -50
              exit 1
            fi
            if [ $i -eq 60 ]; then
              echo "⚠️ QEMU start not detected after 60s, showing logs..."
            fi
            sleep 1
          done

      -
        name: Show container logs
        if: always()
        run: docker logs android 2>&1 | tail -100

      -
        name: Cleanup
        if: always()
        run: |
          docker stop android -t 10 2>/dev/null || true
          docker rm android 2>/dev/null || true
          docker volume rm android-storage 2>/dev/null || true
