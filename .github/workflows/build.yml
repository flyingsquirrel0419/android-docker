name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  check:
    name: Check
    uses: ./.github/workflows/check.yml

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    permissions:
      actions: write
      packages: write
      contents: read
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      -
        name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            flyingsquirrel0419/android
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,priority=100
            type=raw,value=${{ vars.MAJOR || '1' }}.${{ vars.MINOR || '0' }}
          labels: |
            org.opencontainers.image.title=flyingsquirrel0419/android
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login into Docker Hub
        id: docker_login
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.docker_login.outcome == 'success' }}
          provenance: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            VERSION_ARG=${{ steps.meta.outputs.version }}
      -
        name: Create a release
        if: steps.docker_login.outcome == 'success'
        uses: action-pack/github-release@v2
        with:
          tag: "v${{ steps.meta.outputs.version }}"
          title: "v${{ steps.meta.outputs.version }}"
          token: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Increment version variable
        if: steps.docker_login.outcome == 'success'
        uses: action-pack/bump@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Send Discord notification
        if: always()
        run: |
          if [ -z "${{ secrets.DISCORD_WEBHOOK }}" ]; then
            exit 0
          fi
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Build of ${{ github.event.repository.name }} v${{ steps.meta.outputs.version }} ${STATUS}\"}"
