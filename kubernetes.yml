---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: android-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 16Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: android
  labels:
    name: android
spec:
  replicas: 1
  selector:
    matchLabels:
      app: android
  template:
    metadata:
      labels:
        app: android
    spec:
      containers:
      - name: android
        image: flyingsquirrel0419/android
        env:
        - name: VERSION
          value: "11"
        - name: DISK_SIZE
          value: "16G"
        - name: RAM_SIZE
          value: "4G"
        - name: CPU_CORES
          value: "2"
        ports:
          - containerPort: 8006
            name: http
            protocol: TCP
          - containerPort: 5555
            name: adb
            protocol: TCP
          - containerPort: 5900
            name: vnc
            protocol: TCP
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        volumeMounts:
        - mountPath: /storage
          name: storage
        - mountPath: /dev/kvm
          name: dev-kvm
      terminationGracePeriodSeconds: 120
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: android-pvc
      - hostPath:
          path: /dev/kvm
        name: dev-kvm
---
apiVersion: v1
kind: Service
metadata:
  name: android
spec:
  internalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 8006
      protocol: TCP
      targetPort: 8006
    - name: adb
      port: 5555
      protocol: TCP
      targetPort: 5555
    - name: vnc
      port: 5900
      protocol: TCP
      targetPort: 5900
  selector:
    app: android
  type: ClusterIP
