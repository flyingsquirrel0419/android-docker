services:
  android:
    image: flyingsquirrel0419/android
    container_name: android
    environment:
      VERSION: "11"
    devices:
      - /dev/kvm
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 5555:5555
      - 5900:5900
    volumes:
      - ./storage:/storage
    restart: always
    stop_grace_period: 2m
